<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Ganador</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Navegación principal">
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link active" aria-current="page">Home</a></li>

    <main id="main-content">
        <section class="hero" aria-labelledby="hero-title">
            <div class="hero-content">
                <h1 id="hero-title" class="hero-title">
                    Conoce al<br>
                    equipo <span class="accent">ganador</span>
                </h1>
                <p class="hero-description">
                    Una landing sencilla para presentar a los integrantes: avatar, nombre, rol y una ficha con

                </p>
                <a href="src/pages/team-collection-page/team-collection-page.html" class="btn-primary">
                    Ver el equipo
                </a>
            </div>
            <div class="hero-showcase" aria-hidden="true">
                <div class="glass-card">
                    <div class="member-name" data-member="1">Ivan</div>
                    <div class="member-name" data-member="2">Juan</div>
                    <div class="member-name" data-member="3">Eva</div>
                    <div class="member-name" data-member="4">Fran(no esta)</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Team Ganador. Hecho con 💜</p>
